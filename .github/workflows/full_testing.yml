# Inspired by https://github.com/pyg-team/pytorch_geometric/blob/ee30973ed0957a7f29f345d4eeaf9cfd70805109/.github/workflows/full_testing.yml
name: Full Testing CPU

on:
  workflow_dispatch:

jobs:

  test_all_versions:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
        torch-version: [1.13.0, 2.0.0, 2.1.0]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup packages
        uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python-version }}
          torch-version: ${{ matrix.torch-version }}

      - name: Run tests
        run: |
          pytest -m "not network and not benchmark and not gpu"
        shell: bash

      # Tests that depend on reaching external network services (e.g. networks.skewed.de)
      # are flaky in CI, so they run separately and don't fail the build.
      - name: Run network-dependent tests
        continue-on-error: true
        run: |
          pytest -m network --no-cov
        shell: bash
